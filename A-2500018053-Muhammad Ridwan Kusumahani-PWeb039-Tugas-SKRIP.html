<!DOCTYPE html>
<html>

<head>
    <title>Tugas PWeb 03.9</title>
</head>

<body>

    <h1>Contoh Tag Font HTML</h1>

    <p>
        <font color="red">Teks warna merah</font><br>
        <font color="blue">Teks warna biru</font><br>
        <font color="green">Teks warna hijau</font>
    </p>

    <hr>

    <p>
        <font size="1">Ukuran kecil</font><br>
        <font size="3">Ukuran normal</font><br>
        <font size="5">Ukuran besar</font>
    </p>

    <hr>

    <p>
        <font face="Arial">Font Arial</font><br>
        <font face="Courier New">Font Courier New</font><br>
        <font face="Times New Roman">Font Times New Roman</font>
    </p>

    <hr>

    <p>
        <font color="purple" size="5" face="Verdana">
            Kombinasi warna, ukuran, dan font
        </font>
    </p>

    <p>
        Saya sedang belajar <font color="orange">HTML</font> dan
        membuat teks dengan <font size="5">berbagai ukuran</font>
        serta <font face="Courier New">jenis font</font>.
    </p>

</body>

</html>
